openapi: 3.1.0
info:
  title: eBPF Trigger Observatory API
  version: 0.1.0
  summary: Safe observability and administration API for an eBPF/XDP trigger research platform.
servers:
  - url: http://localhost:8080
tags:
  - name: Health
  - name: Rules
  - name: Events
  - name: Stats
  - name: Audit
paths:
  /health:
    get:
      tags: [Health]
      summary: Service liveness probe
      responses:
        "200":
          description: Service is healthy
  /rules:
    get:
      tags: [Rules]
      summary: List active and historical rules
      responses:
        "200":
          description: Rule list
    post:
      tags: [Rules]
      summary: Create a new trigger rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRuleRequest"
      responses:
        "201":
          description: Rule created
  /rules/{ruleId}:
    get:
      tags: [Rules]
      summary: Get a rule by id
      parameters:
        - $ref: "#/components/parameters/RuleId"
      responses:
        "200":
          description: Rule detail
    patch:
      tags: [Rules]
      summary: Update rule policy or matcher fields
      parameters:
        - $ref: "#/components/parameters/RuleId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRuleRequest"
      responses:
        "200":
          description: Rule updated
  /events:
    get:
      tags: [Events]
      summary: Search observed events
      parameters:
        - in: query
          name: sourceIp
          schema:
            type: string
        - in: query
          name: action
          schema:
            type: string
            enum: [PASS, DROP, SAMPLE_ONLY]
        - in: query
          name: ruleId
          schema:
            type: string
        - in: query
          name: from
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Event search results
  /events/{eventId}:
    get:
      tags: [Events]
      summary: Get detailed event evidence
      parameters:
        - $ref: "#/components/parameters/EventId"
      responses:
        "200":
          description: Event detail
  /stats/overview:
    get:
      tags: [Stats]
      summary: Aggregated dashboard metrics
      responses:
        "200":
          description: Dashboard overview
  /audit-logs:
    get:
      tags: [Audit]
      summary: Search administrative audit records
      parameters:
        - in: query
          name: actor
          schema:
            type: string
        - in: query
          name: action
          schema:
            type: string
      responses:
        "200":
          description: Audit records
components:
  parameters:
    RuleId:
      in: path
      name: ruleId
      required: true
      schema:
        type: string
    EventId:
      in: path
      name: eventId
      required: true
      schema:
        type: string
  schemas:
    CreateRuleRequest:
      type: object
      required: [name, startMarker, expectedPayloadLength, action]
      properties:
        name:
          type: string
        description:
          type: string
        startMarker:
          type: string
        endMarker:
          type: string
        expectedPayloadLength:
          type: integer
          minimum: 1
        protocol:
          type: string
          default: UDP
        action:
          type: string
          enum: [PASS, DROP, SAMPLE_ONLY]
        previewBytes:
          type: integer
          default: 32
    UpdateRuleRequest:
      type: object
      properties:
        description:
          type: string
        startMarker:
          type: string
        endMarker:
          type: string
        expectedPayloadLength:
          type: integer
          minimum: 1
        action:
          type: string
          enum: [PASS, DROP, SAMPLE_ONLY]
        enabled:
          type: boolean
